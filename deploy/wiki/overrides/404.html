<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — SoSad</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .glitch {
            font-size: clamp(80px, 20vw, 200px);
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            color: #fff;
            text-shadow:
                0.05em 0 0 #ff004f,
                -0.05em -0.025em 0 #00fff9,
                0.025em 0.05em 0 #ff004f;
            animation: glitch 500ms infinite;
            letter-spacing: 0.05em;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch::before {
            animation: glitch-clip 2s infinite linear alternate-reverse;
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            transform: translate(-0.025em, -0.0125em);
            opacity: 0.8;
        }

        .glitch::after {
            animation: glitch-clip2 3s infinite linear alternate-reverse;
            clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
            transform: translate(0.025em, 0.0125em);
            opacity: 0.8;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 #ff004f, -0.05em -0.025em 0 #00fff9, 0.025em 0.05em 0 #ff004f; }
            14% { text-shadow: 0.05em 0 0 #ff004f, -0.05em -0.025em 0 #00fff9, 0.025em 0.05em 0 #ff004f; }
            15% { text-shadow: -0.05em -0.025em 0 #ff004f, 0.025em 0.025em 0 #00fff9, -0.05em -0.05em 0 #ff004f; }
            49% { text-shadow: -0.05em -0.025em 0 #ff004f, 0.025em 0.025em 0 #00fff9, -0.05em -0.05em 0 #ff004f; }
            50% { text-shadow: 0.025em 0.05em 0 #ff004f, 0.05em 0 0 #00fff9, 0 -0.05em 0 #ff004f; }
            99% { text-shadow: 0.025em 0.05em 0 #ff004f, 0.05em 0 0 #00fff9, 0 -0.05em 0 #ff004f; }
            100% { text-shadow: -0.025em 0 0 #ff004f, -0.025em -0.025em 0 #00fff9, -0.025em -0.05em 0 #ff004f; }
        }

        @keyframes glitch-clip {
            0% { clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%); }
            20% { clip-path: polygon(0 15%, 100% 15%, 100% 15%, 0 15%); }
            40% { clip-path: polygon(0 10%, 100% 10%, 100% 20%, 0 20%); }
            60% { clip-path: polygon(0 1%, 100% 1%, 100% 2%, 0 2%); }
            80% { clip-path: polygon(0 33%, 100% 33%, 100% 33%, 0 33%); }
            100% { clip-path: polygon(0 44%, 100% 44%, 100% 44%, 0 44%); }
        }

        @keyframes glitch-clip2 {
            0% { clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%); }
            25% { clip-path: polygon(0 80%, 100% 80%, 100% 80%, 0 80%); }
            50% { clip-path: polygon(0 70%, 100% 70%, 100% 90%, 0 90%); }
            75% { clip-path: polygon(0 50%, 100% 50%, 100% 65%, 0 65%); }
            100% { clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%); }
        }

        .subtitle {
            font-size: clamp(14px, 3vw, 24px);
            color: #888;
            margin-top: 1rem;
            font-weight: 400;
        }

        .subtitle span {
            color: #ff004f;
        }

        .msg {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(10px, 2vw, 14px);
            color: #555;
            margin-top: 2rem;
            line-height: 1.8;
        }

        .msg .line { opacity: 0; animation: fade-in 0.5s forwards; }
        .msg .line:nth-child(1) { animation-delay: 0.5s; }
        .msg .line:nth-child(2) { animation-delay: 1s; }
        .msg .line:nth-child(3) { animation-delay: 1.5s; }
        .msg .line:nth-child(4) { animation-delay: 2s; }

        @keyframes fade-in {
            to { opacity: 1; }
        }

        .home-link {
            display: inline-block;
            margin-top: 2.5rem;
            padding: 0.8rem 2rem;
            background: #ff004f;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background: #ff3370;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 0, 79, 0.3);
        }

        .bg-grid {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image:
                linear-gradient(rgba(255,0,79,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,0,79,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,0,79,0.08) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="container">
        <div class="glitch" data-text="404">404</div>
        <p class="subtitle">This page is <span>so sad</span> right now.</p>

        <div class="msg">
            <div class="line">> page.find("your-route")</div>
            <div class="line">> ERROR: PageNotFoundException</div>
            <div class="line">> "Even the best bots lose their way sometimes."</div>
            <div class="line">> <a href="/" style="color:#ff004f;text-decoration:none;">cd /home</a></div>
        </div>

        <a href="/" class="home-link">← Back to Safety</a>
    </div>
</body>
</html>
